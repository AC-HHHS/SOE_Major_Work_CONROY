<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type = "text/css" href="{{ url_for('static', filename='main.css') }}">
    <title>Document</title>
</head>
<body>
    <div class="banner">
            <div class="banner-content">
                <a href="{{ url_for('logout') }}">Log Out</a>   
                <a href="/admin"> Go Back</a>
            </div>
        </div>
    <main>

    <h2>User Management</h2>
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Admin?</th>
                <th>Action</th>
            </tr>
        </thead>
    <tbody>
            {% for u in users %}
                <tr>
                    <td>{{ u[0] }} {{ u[1] }}</td>
                    <td>{{ u[2] }}</td>
                    <td>{{ "Yes" if u[3] == 1 else "No" }}</td>
                    <td>
                        {% if u[3] == 0 %}
                            <a href="{{ url_for('make_admin', email=u[2]) }}">Make Admin</a>
                        {% endif %}
                    </td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
    </main>
</body>
</html>
