<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
    <title>Edit Quiz</title>
    <style>
        form { max-width: 520px; }
        label { display: block; font-weight: 600; font-size: 0.9rem;
                margin-bottom: 0.3rem; margin-top: 1rem; }
        input[type=text], select {
            width: 100%; padding: 0.6rem 0.8rem; border: 2px solid #e0e0e0;
            border-radius: 7px; font-size: 0.95rem; box-sizing: border-box;
        }
        input[type=text]:focus, select:focus {
            border-color: #2c7be5; outline: none;
        }
        .btn { padding: 0.6rem 1.4rem; border-radius: 7px; border: none;
               font-size: 0.95rem; font-weight: 600; cursor: pointer;
               text-decoration: none; display: inline-block; }
        .btn-primary { background: #2c7be5; color: white; margin-top: 1.2rem; }
        .btn-primary:hover { background: #1a6bd4; }
        .btn-secondary { background: #f0f5ff; color: #2c7be5;
                         border: 1px solid #2c7be5; margin-top: 1.2rem;
                         margin-left: 0.5rem; }
        .btn-secondary:hover { background: #dce8ff; }
    </style>
</head>
<body>
    <div class="banner">
        <div class="banner-content">
            <a href="{{ url_for('logout') }}">Log Out</a>
            <a href="/quiz_detail/{{ quiz[0] }}">Back to Quiz</a>
        </div>
    </div>
    <main>
        <h1>Edit Quiz</h1>

        <form method="POST" action="/edit_quiz/{{ quiz[0] }}">
            <label>Quiz Name</label>
            <input type="text" name="name" value="{{ quiz[1] }}" required>

            <label>Topic</label>
            <input type="text" name="topic" value="{{ quiz[2] }}" required>

            <label>Level</label>
            <select name="level" required>
                {% for i in range(1, 6) %}
                <option value="{{ i }}" {% if quiz[3] == i %}selected{% endif %}>
                    Level {{ i }}
                </option>
                {% endfor %}
            </select>

            <div>
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <a href="/quiz_detail/{{ quiz[0] }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </main>
</body>
</html>
