<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
    <title>Edit Question</title>
    <style>
        form { max-width: 640px; }
        label { display: block; font-weight: 600; font-size: 0.9rem;
                margin-bottom: 0.3rem; margin-top: 1rem; }
        input[type=text], textarea, select {
            width: 100%; padding: 0.6rem 0.8rem; border: 2px solid #e0e0e0;
            border-radius: 7px; font-size: 0.95rem; box-sizing: border-box;
        }
        input[type=text]:focus, textarea:focus, select:focus {
            border-color: #2c7be5; outline: none;
        }
        .btn { padding: 0.6rem 1.4rem; border-radius: 7px; border: none;
               font-size: 0.95rem; font-weight: 600; cursor: pointer; }
        .btn-primary { background: #2c7be5; color: white; margin-top: 1.2rem; }
        .btn-primary:hover { background: #1a6bd4; }
        .mc-fields { margin-top: 0.5rem; }
    </style>
</head>
<body>
    <div class="banner">
        <div class="banner-content">
            <a href="{{ url_for('logout') }}">Log Out</a>
            <a href="{{ url_for('add_question_page') }}">Back to Question Manager</a>
        </div>
    </div>
    <main>
        <h1>Edit Question #{{ question[0] }}</h1>

        <form method="POST" action="/edit_question/{{ question[0] }}">
            <label>Topic</label>
            <input type="text" name="topic" value="{{ question[1] }}" required>

            <label>Level</label>
            <select name="level" required>
                {% for i in range(1, 6) %}
                <option value="{{ i }}" {% if question[2] == i %}selected{% endif %}>
                    Level {{ i }}
                </option>
                {% endfor %}
            </select>

            <label>Marks</label>
            <input type="text" name="marks" value="{{ question[12] if question[12] else 1 }}" required>

            <label>Question Text</label>
            <textarea name="question_text" rows="4" required>{{ question[3] }}</textarea>

            <div class="mc-fields">
                <label>Option A</label>
                <input type="text" name="option_a" value="{{ question[5] }}">
                <label>Option B</label>
                <input type="text" name="option_b" value="{{ question[6] }}">
                <label>Option C</label>
                <input type="text" name="option_c" value="{{ question[7] }}">
                <label>Option D</label>
                <input type="text" name="option_d" value="{{ question[8] }}">

                <label>Correct Answer</label>
                <select name="correct_answer">
                    <option value="">— (not MC) —</option>
                    {% for letter in ['A','B','C','D'] %}
                    <option value="{{ letter }}"
                        {% if question[4] == letter %}selected{% endif %}>
                        Option {{ letter }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <button type="submit" class="btn btn-primary">Save Changes</button>
        </form>
    </main>
</body>
</html>
